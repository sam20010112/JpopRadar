spring.application.name=jpopradar

# H2 in-memory database (swap for MySQL/Postgres in production)
spring.datasource.url=jdbc:h2:mem:jpopradar
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.show-sql=true

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=${PORT:8080}

app.concerts-scan-url=https://jpopradar-data.s3.ap-northeast-3.amazonaws.com/concertsScan.json
